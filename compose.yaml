
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skills_api_php
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      APP_SECRET: ${APP_SECRET:-change-me-in-docker}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-16}&charset=utf8
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-}
    volumes:
      - ./:/var/www/html
      - php_vendor:/var/www/html/vendor
      - php_var:/var/www/html/var
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: skills_api_nginx
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: skills_api_database
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

volumes:
  database_data:
  php_vendor:
  php_var:
