name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  COMPOSE_FILE: compose.yaml
  COMPOSE_PROJECT_NAME: skills-api-ci
  PHP_IMAGE: skills-api-ci-php
  COMPOSER_CACHE_DIR: /tmp/composer-cache
  TEST_DATABASE_URL: postgresql://app:app@database:5432/app_test?serverVersion=16&charset=utf8

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 #v4.1

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci
        with:
          compose-file: ${{ env.COMPOSE_FILE }}
          php-image: ${{ env.PHP_IMAGE }}
          composer-cache-dir: ${{ env.COMPOSER_CACHE_DIR }}
          buildx-cache-dir: /tmp/.buildx-cache
          test-database-url: ${{ env.TEST_DATABASE_URL }}

      - name: Symfony verification commands
        run: |
          docker compose -f "${COMPOSE_FILE}" exec -T \
            -e APP_ENV=test \
            -e APP_DEBUG=0 \
            -e DATABASE_URL="${TEST_DATABASE_URL}" \
            php \
            php bin/console lint:yaml config --parse-tags

          docker compose -f "${COMPOSE_FILE}" exec -T \
            -e APP_ENV=test \
            -e APP_DEBUG=0 \
            -e DATABASE_URL="${TEST_DATABASE_URL}" \
            php \
            php bin/console lint:twig templates

          docker compose -f "${COMPOSE_FILE}" exec -T \
            -e APP_ENV=test \
            -e APP_DEBUG=0 \
            -e DATABASE_URL="${TEST_DATABASE_URL}" \
            php \
            php bin/console lint:container

          docker compose -f "${COMPOSE_FILE}" exec -T \
            -e APP_ENV=test \
            -e APP_DEBUG=0 \
            -e DATABASE_URL="${TEST_DATABASE_URL}" \
            php \
            php bin/console doctrine:schema:validate

      - name: Shutdown stack
        if: always()
        run: |
          docker compose -f "${COMPOSE_FILE}" down -v --remove-orphans

  tests:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 #v4.1

      - name: Setup CI environment
        uses: ./.github/actions/setup-ci
        with:
          compose-file: ${{ env.COMPOSE_FILE }}
          php-image: ${{ env.PHP_IMAGE }}
          composer-cache-dir: ${{ env.COMPOSER_CACHE_DIR }}
          buildx-cache-dir: /tmp/.buildx-cache
          test-database-url: ${{ env.TEST_DATABASE_URL }}

      - name: PHPUnit
        run: |
          php_exec() {
            docker compose -f "${COMPOSE_FILE}" exec -T \
              -e APP_ENV=test \
              -e APP_DEBUG=0 \
              -e DATABASE_URL="${TEST_DATABASE_URL}" \
              php "$@"
          }

          php_exec bin/console lexik:jwt:generate-keypair --overwrite --no-interaction
          php_exec vendor/bin/phpunit -c phpunit.dist.xml

      - name: Shutdown stack
        if: always()
        run: |
          docker compose -f "${COMPOSE_FILE}" down -v --remove-orphans
